<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球情报中心 | 每日深度简报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        :root { --apple-bg: #ffffff; --apple-grey: #f5f5f7; --apple-text: #1d1d1f; --apple-subtext: #86868b; --apple-blue: #0066cc; }
        body { font-family: -apple-system, "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, "Noto Sans SC", sans-serif; background-color: var(--apple-bg); color: var(--apple-text); -webkit-font-smoothing: antialiased; }
        .apple-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .section-header { font-size: 40px; font-weight: 700; margin-bottom: 40px; }
        .news-card { background: var(--apple-grey); border-radius: 28px; padding: 40px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.25, 1); border: 1px solid transparent; height: 100%; display: flex; flex-direction: column; }
        .news-card:hover { transform: scale(1.01); }
        .category-tag { font-size: 13px; font-weight: 600; color: var(--apple-subtext); text-transform: uppercase; margin-bottom: 12px; display: block; }
        .title-link { font-size: 24px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; display: block; color: var(--apple-text); text-decoration: none; }
        .title-link:hover { color: var(--apple-blue); }
        .time-label { font-size: 14px; color: var(--apple-subtext); margin-bottom: 24px; display: flex; align-items: center; }
        .score-container { margin-bottom: 32px; padding: 20px; background: #ffffff; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; }
        .score-value { font-size: 22px; font-weight: 700; color: var(--apple-text); }
        .stars-row { color: #FF9500; font-size: 20px; display: flex; gap: 4px; filter: drop-shadow(0 0 2px rgba(255, 149, 0, 0.2)); }
        .insight-box { font-size: 16px; line-height: 1.6; color: #424245; position: relative; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.05); flex-grow: 1; }
        .insight-label { font-weight: 600; color: var(--apple-text); margin-bottom: 6px; display: block; font-size: 15px; }
        .pill-button { background: #0071e3; color: white; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="apple-nav sticky top-0 z-50 py-4">
        <div class="max-w-7xl mx-auto px-10 flex justify-between items-center">
            <span class="text-xl font-bold tracking-tight">全球情报中心</span>
            <div class="flex items-center space-x-8 text-sm font-medium">
                <span id="update-time-nav" class="text-slate-500 italic">加载中...</span>
                <a href="#" class="pill-button">订阅简报</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-10 py-24">
        <header class="mb-32">
            <h1 class="text-7xl font-bold tracking-tight mb-8">全球情报。<br/><span class="text-slate-300">由 AI 深度解构。</span></h1>
            <p class="text-2xl text-slate-500 max-w-3xl leading-relaxed">由先进神经元网络驱动的每日简报。我们为您过滤杂讯，解析信号，并实时评估每一项战略动态的推荐权重。</p>
        </header>

        <div id="news-content">
            <!-- 动态渲染位置 -->
            <div class="text-center py-20 text-slate-400">正在同步全球情报数据...</div>
        </div>
    </main>

    <footer class="py-24 bg-slate-50">
        <div class="max-w-7xl mx-auto px-10 border-t border-slate-200 pt-12">
            <div class="flex flex-col md:flex-row justify-between items-start text-sm text-slate-500 gap-8">
                <div class="max-w-xs"><span class="font-bold text-slate-900 block mb-4">全球情报中心</span>由神经元原生构建的情报服务。</div>
                <div class="flex space-x-24">
                    <div class="space-y-4"><span class="font-semibold text-slate-900 block">系统</span><a href="#" class="block hover:text-slate-900">Gemini 2.5 Pro 驱动</a></div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('data/news.json');
                const data = await response.json();
                document.getElementById('update-time-nav').textContent = data.update_time + ' 更新';
                
                const content = document.getElementById('news-content');
                content.innerHTML = '';

                const regionNames = { 'international': '国际视野', 'china': '中国聚焦' };
                const catNames = { 'finance': '财经', 'technology': '科技', 'AI': '人工智能' };

                for (const [region, categories] of Object.entries(data.regions)) {
                    const section = document.createElement('section');
                    section.className = 'mb-40';
                    section.innerHTML = `<h2 class="section-header">${regionNames[region]}</h2>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10';

                    for (const [cat, items] of Object.entries(categories)) {
                        items.forEach(item => {
                            const card = `
                                <div class="news-card">
                                    <span class="category-tag">${catNames[cat]}</span>
                                    <a href="${item.url}" target="_blank" class="title-link">${item.title}</a>
                                    <div class="time-label"><i class="far fa-clock mr-2"></i> ${item.publish_time}</div>
                                    <div class="score-container shadow-sm border border-slate-50">
                                        <div>
                                            <div class="text-[10px] uppercase tracking-widest text-slate-400 mb-1">推荐权重</div>
                                            <div class="score-value">${item.score}</div>
                                        </div>
                                        <div class="stars-row"><span>${item.stars}</span></div>
                                    </div>
                                    <div class="insight-box">
                                        <span class="insight-label">AI 战略洞察</span>
                                        <p>${item.insight}</p>
                                    </div>
                                </div>
                            `;
                            grid.innerHTML += card;
                        });
                    }
                    section.appendChild(grid);
                    content.appendChild(section);
                }
            } catch (e) {
                console.error('加载失败', e);
            }
        }
        loadNews();
    </script>
</body>
</html>
